<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">

  <!-- Icon background — solid brand green -->
  <rect x="0" y="0" width="80" height="80" rx="16" fill="#1F5F2E"/>

  <!-- QR frame white -->
  <rect x="14" y="14" width="52" height="52" rx="6" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- TL corner -->
  <rect x="20" y="20" width="16" height="16" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="23" y="23" width="10" height="10" rx="1.5" fill="white"/>

  <!-- TR corner -->
  <rect x="44" y="20" width="16" height="16" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="47" y="23" width="10" height="10" rx="1.5" fill="white"/>

  <!-- BL corner -->
  <rect x="20" y="44" width="16" height="16" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="23" y="47" width="10" height="10" rx="1.5" fill="white"/>

  <!-- Green dots -->
  <rect x="46" y="46" width="5" height="5" rx="1" fill="#6FCF97"/>
  <rect x="54" y="46" width="5" height="5" rx="1" fill="#6FCF97"/>
  <rect x="46" y="54" width="5" height="5" rx="1" fill="#6FCF97"/>
  <rect x="54" y="54" width="5" height="5" rx="1" fill="#6FCF97"/>

  <!-- Leaf -->
  <path d="M36 44 C36 32 44 26 54 26 C54 38 47 46 36 44Z" fill="white"/>
  <path d="M36 44 C38 32 44 26 54 26" fill="none" stroke="#1F5F2E" stroke-width="1"/>

  <!-- White wordmark -->
  <text x="96" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Scan<tspan fill="#6FCF97">Dine</tspan></text>
  <text x="97" y="56" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)" letter-spacing="2.5" font-weight="400">RESTAURANT PLATFORM</text>

</svg>
